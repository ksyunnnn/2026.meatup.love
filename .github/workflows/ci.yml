name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      # NEXT_PUBLIC_FIREBASE_* are public config (not secrets) inlined at build
      # time; the browser still relies on Firestore rules for access control.
      # Dummy non-empty values let the static prerender run (Firebase init won't
      # throw auth/invalid-api-key). The real values are set in the Cloudflare
      # Pages dashboard for the production build.
      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: demo-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-meatup.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-meatup
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo-meatup.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:demo"
          NEXT_PUBLIC_USE_EMULATOR: "false"

      - name: Unit tests
        run: npm test

      # Firestore rules tests run against the emulator, which needs a JDK.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Firestore rules tests
        run: npm run test:rules
