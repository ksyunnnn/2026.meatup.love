name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (static export)
        run: npm run build

      - name: Unit tests
        run: npm test

      # Firestore rules tests run against the emulator, which needs a JDK.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Firestore rules tests
        run: npm run test:rules
